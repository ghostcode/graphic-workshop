<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图文工坊 - 图片配字工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Long+Cang&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f1419',
            surface: '#1a2332',
            card: '#232f3e',
            border: '#2d3a4d',
            muted: '#6b7a8f',
            fg: '#e8edf4',
            accent: '#e8a838',
            'accent-dim': '#c4872a',
          },
          fontFamily: {
            sans: ['Noto Sans SC', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #1a2332;
    }

    ::-webkit-scrollbar-thumb {
      background: #3d4d63;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #4d5d73;
    }

    /* 颜色选择器美化 */
    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      cursor: pointer;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 6px;
    }

    /* Range 美化 */
    input[type="range"] {
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-track {
      height: 4px;
      background: #2d3a4d;
      border-radius: 2px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #e8a838;
      border-radius: 50%;
      margin-top: -6px;
      transition: transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* 入场动画 */
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-enter {
      animation: fadeSlideUp 0.5s ease forwards;
    }

    .delay-1 {
      animation-delay: 0.1s;
      opacity: 0;
    }

    .delay-2 {
      animation-delay: 0.2s;
      opacity: 0;
    }

    .delay-3 {
      animation-delay: 0.3s;
      opacity: 0;
    }

    /* 按钮点击效果 */
    .btn-press {
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    .btn-press:active {
      transform: scale(0.96);
    }

    /* 画布容器 */
    #canvasContainer {
      background-image:
        linear-gradient(45deg, #1a2332 25%, transparent 25%),
        linear-gradient(-45deg, #1a2332 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a2332 75%),
        linear-gradient(-45deg, transparent 75%, #1a2332 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      background-color: #0f1419;
    }

    /* Tab 样式 */
    .tab-btn {
      position: relative;
      transition: color 0.2s ease;
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #e8a838;
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .tab-btn.active {
      color: #e8a838;
    }

    .tab-btn.active::after {
      transform: scaleX(1);
    }

    /* 字体预览 */
    .font-noto-sans {
      font-family: 'Noto Sans SC', sans-serif;
    }

    .font-noto-serif {
      font-family: 'Noto Serif SC', serif;
    }

    .font-kuaile {
      font-family: 'ZCOOL KuaiLe', sans-serif;
    }

    .font-qingke {
      font-family: 'ZCOOL QingKe HuangYou', sans-serif;
    }

    .font-xiaowei {
      font-family: 'ZCOOL XiaoWei', serif;
    }

    .font-mashan {
      font-family: 'Ma Shan Zheng', cursive;
    }

    .font-longcang {
      font-family: 'Long Cang', cursive;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body class="bg-bg text-fg min-h-screen">
  <!-- 背景装饰 -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-accent/5 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-1/4 w-80 h-80 bg-blue-500/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 max-w-7xl mx-auto px-4 py-6 md:py-10">
    <!-- Header -->
    <header class="text-center mb-8 md:mb-12 animate-enter">
      <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-2">
        <span class="text-accent">图文</span>工坊
      </h1>
      <p class="text-muted text-sm md:text-base">为图片添加精美文字，支持颜色生成与本地上传</p>
    </header>

    <!-- 主内容区 -->
    <div class="grid lg:grid-cols-[380px_1fr] gap-6">
      <!-- 左侧控制面板 -->
      <aside class="space-y-4 animate-enter delay-1">
        <!-- 图片来源 -->
        <section class="bg-surface rounded-xl p-5 border border-border">
          <h2 class="text-sm font-medium text-muted uppercase tracking-wider mb-4">图片来源</h2>

          <!-- Tab 切换 -->
          <div class="flex gap-4 mb-5 border-b border-border pb-3">
            <button class="tab-btn active text-sm font-medium pb-1" data-tab="generate">颜色生成</button>
            <button class="tab-btn text-muted text-sm font-medium pb-1" data-tab="upload">上传图片</button>
          </div>

          <!-- 颜色生成面板 -->
          <div id="generatePanel" class="space-y-4">
            <div class="flex gap-2">
              <button
                class="mode-btn flex-1 py-2 px-3 rounded-lg bg-card border border-accent text-accent text-sm font-medium btn-press"
                data-mode="solid">纯色</button>
              <button
                class="mode-btn flex-1 py-2 px-3 rounded-lg bg-card border border-border text-muted text-sm font-medium btn-press hover:border-accent/50 hover:text-fg transition-colors"
                data-mode="gradient">渐变</button>
            </div>

            <!-- 纯色模式 -->
            <div id="solidPicker" class="space-y-3">
              <label class="block text-sm text-muted">背景颜色</label>
              <div class="flex items-center gap-3">
                <input type="color" id="bgColor1" value="#2d3a4d" class="w-12 h-10 rounded-lg cursor-pointer">
                <input type="text" id="bgColor1Text" value="#2d3a4d"
                  class="flex-1 bg-card border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent">
              </div>
            </div>

            <!-- 渐变模式 -->
            <div id="gradientPicker" class="space-y-3 hidden">
              <label class="block text-sm text-muted">渐变颜色</label>
              <div class="flex items-center gap-3">
                <input type="color" id="gradColor1" value="#1a2332" class="w-12 h-10 rounded-lg">
                <div class="flex-1 h-10 rounded-lg" id="gradPreview"
                  style="background: linear-gradient(90deg, #1a2332, #e8a838)"></div>
                <input type="color" id="gradColor2" value="#e8a838" class="w-12 h-10 rounded-lg">
              </div>
              <div class="flex gap-2">
                <button
                  class="grad-dir flex-1 py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-dir="to right">左右</button>
                <button
                  class="grad-dir flex-1 py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-dir="to bottom">上下</button>
                <button
                  class="grad-dir flex-1 py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-dir="to bottom right">对角</button>
                <button
                  class="grad-dir flex-1 py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-dir="circle">径向</button>
              </div>
            </div>

            <!-- 画布尺寸 -->
            <div class="pt-2">
              <label class="block text-sm text-muted mb-2">画布尺寸</label>
              <div class="grid grid-cols-3 gap-2">
                <button
                  class="size-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-w="800" data-h="600">4:3</button>
                <button class="size-btn py-2 rounded-lg bg-accent/20 border border-accent text-accent text-xs"
                  data-w="800" data-h="800">1:1</button>
                <button
                  class="size-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-w="600" data-h="800">3:4</button>
                <button
                  class="size-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-w="800" data-h="450">16:9</button>
                <button
                  class="size-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-w="1080" data-h="1920">9:16</button>
                <button
                  class="size-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-w="1200" data-h="630">社交</button>
              </div>
            </div>
          </div>

          <!-- 上传面板 -->
          <div id="uploadPanel" class="hidden">
            <div id="dropZone"
              class="border-2 border-dashed border-border rounded-xl p-8 text-center hover:border-accent/50 transition-colors cursor-pointer">
              <svg class="w-10 h-10 mx-auto mb-3 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p class="text-sm text-muted mb-1">点击或拖拽上传图片</p>
              <p class="text-xs text-muted/60">支持 JPG, PNG, WebP</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
          </div>
        </section>

        <!-- 文字编辑 -->
        <section class="bg-surface rounded-xl p-5 border border-border">
          <h2 class="text-sm font-medium text-muted uppercase tracking-wider mb-4">文字编辑</h2>

          <div class="space-y-4">
            <!-- 文字输入 -->
            <div>
              <label class="block text-sm text-muted mb-2">文字内容</label>
              <textarea id="textContent" rows="3" placeholder="输入要添加的文字..."
                class="w-full bg-card border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent resize-none">图文工坊</textarea>
            </div>

            <!-- 字体选择 -->
            <div>
              <label class="block text-sm text-muted mb-2">字体</label>
              <select id="fontFamily"
                class="w-full bg-card border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent cursor-pointer">
                <option value="Noto Sans SC" class="font-noto-sans">思源黑体</option>
                <option value="Noto Serif SC" class="font-noto-serif">思源宋体</option>
                <option value="ZCOOL KuaiLe" class="font-kuaile">站酷快乐体</option>
                <option value="ZCOOL QingKe HuangYou" class="font-qingke">站酷庆科黄油体</option>
                <option value="ZCOOL XiaoWei" class="font-xiaowei">站酷小薇体</option>
                <option value="Ma Shan Zheng" class="font-mashan">马善政楷体</option>
                <option value="Long Cang" class="font-longcang">龙藏体</option>
              </select>
            </div>

            <!-- 字号和粗细 -->
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm text-muted mb-2">字号 <span id="fontSizeVal"
                    class="text-accent">48px</span></label>
                <input type="range" id="fontSize" min="12" max="200" value="48" class="w-full">
              </div>
              <div>
                <label class="block text-sm text-muted mb-2">粗细 <span id="fontWeightVal"
                    class="text-accent">400</span></label>
                <input type="range" id="fontWeight" min="100" max="900" step="100" value="400" class="w-full">
              </div>
            </div>

            <!-- 文字颜色 -->
            <div>
              <label class="block text-sm text-muted mb-2">文字颜色</label>
              <div class="flex items-center gap-3">
                <input type="color" id="textColor" value="#ffffff" class="w-12 h-10 rounded-lg">
                <input type="text" id="textColorText" value="#ffffff"
                  class="flex-1 bg-card border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent">
                <div class="flex gap-1">
                  <button
                    class="color-preset w-8 h-8 rounded-lg bg-white border border-border hover:scale-110 transition-transform"
                    data-color="#ffffff"></button>
                  <button
                    class="color-preset w-8 h-8 rounded-lg bg-black border border-border hover:scale-110 transition-transform"
                    data-color="#000000"></button>
                  <button
                    class="color-preset w-8 h-8 rounded-lg border border-border hover:scale-110 transition-transform"
                    style="background:#e8a838" data-color="#e8a838"></button>
                </div>
              </div>
            </div>

            <!-- 文字效果 -->
            <div>
              <label class="block text-sm text-muted mb-2">文字效果</label>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="text-xs text-muted/60">描边 <span id="strokeVal" class="text-accent">0px</span></label>
                  <input type="range" id="strokeWidth" min="0" max="10" value="0" class="w-full">
                </div>
                <div>
                  <label class="text-xs text-muted/60">阴影 <span id="shadowVal" class="text-accent">0px</span></label>
                  <input type="range" id="shadowBlur" min="0" max="30" value="0" class="w-full">
                </div>
              </div>
              <div class="flex gap-3 mt-2">
                <div class="flex-1">
                  <label class="text-xs text-muted/60">描边颜色</label>
                  <input type="color" id="strokeColor" value="#000000" class="w-full h-8 rounded-lg">
                </div>
                <div class="flex-1">
                  <label class="text-xs text-muted/60">阴影颜色</label>
                  <input type="color" id="shadowColor" value="#000000" class="w-full h-8 rounded-lg">
                </div>
              </div>
            </div>

            <!-- 位置调整 -->
            <div>
              <label class="block text-sm text-muted mb-2">位置</label>
              <div class="grid grid-cols-3 gap-2 mb-2">
                <button
                  class="pos-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-pos="tl">左上</button>
                <button
                  class="pos-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-pos="tc">中上</button>
                <button
                  class="pos-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-pos="tr">右上</button>
                <button
                  class="pos-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-pos="ml">左中</button>
                <button class="pos-btn py-2 rounded-lg bg-accent/20 border border-accent text-accent text-xs"
                  data-pos="mc">居中</button>
                <button
                  class="pos-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-pos="mr">右中</button>
                <button
                  class="pos-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-pos="bl">左下</button>
                <button
                  class="pos-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-pos="bc">中下</button>
                <button
                  class="pos-btn py-2 rounded-lg bg-card border border-border text-xs hover:border-accent/50 transition-colors"
                  data-pos="br">右下</button>
              </div>
              <p class="text-xs text-muted/60 text-center">或在画布上拖拽文字</p>
            </div>
          </div>
        </section>

        <!-- 导出按钮 -->
        <button id="downloadBtn"
          class="w-full py-3 bg-accent hover:bg-accent-dim text-bg font-medium rounded-xl btn-press transition-colors flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
          下载图片
        </button>
      </aside>

      <!-- 右侧画布区 -->
      <main class="animate-enter delay-2">
        <div class="bg-surface rounded-xl border border-border p-4 md:p-6">
          <div class="flex items-center justify-between mb-4">
            <span class="text-sm text-muted">预览</span>
            <span id="canvasSize" class="text-xs text-muted/60">800 x 800</span>
          </div>
          <div id="canvasContainer"
            class="rounded-lg overflow-hidden flex items-center justify-center min-h-[300px] md:min-h-[500px]">
            <canvas id="mainCanvas"></canvas>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-10 text-xs text-muted/40 animate-enter delay-3">
      <p>拖拽文字可调整位置 · 支持多种中文字体 · 图片仅在本地处理</p>
    </footer>
  </div>

  <script>
    // ===== 状态管理 =====
    const state = {
      // 图片源
      source: 'generate', // 'generate' | 'upload'
      mode: 'solid', // 'solid' | 'gradient'

      // 画布
      canvasWidth: 800,
      canvasHeight: 800,

      // 纯色
      bgColor1: '#2d3a4d',

      // 渐变
      gradColor1: '#1a2332',
      gradColor2: '#e8a838',
      gradDir: 'to right',

      // 上传的图片
      uploadedImage: null,

      // 文字
      text: '图文工坊',
      fontFamily: 'Noto Sans SC',
      fontSize: 48,
      fontWeight: 400,
      textColor: '#ffffff',
      strokeWidth: 0,
      strokeColor: '#000000',
      shadowBlur: 0,
      shadowColor: '#000000',
      textX: 0.5, // 0-1 相对位置
      textY: 0.5,

      // 拖拽
      isDragging: false,
      dragStartX: 0,
      dragStartY: 0,
      originalTextX: 0,
      originalTextY: 0
    };

    // ===== DOM 元素 =====
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvasContainer');

    // ===== 初始化 =====
    function init() {
      setupCanvas();
      bindEvents();
      render();
    }

    function setupCanvas() {
      canvas.width = state.canvasWidth;
      canvas.height = state.canvasHeight;
      updateCanvasDisplay();
    }

    function updateCanvasDisplay() {
      const maxWidth = canvasContainer.clientWidth - 32;
      const maxHeight = 500;
      const scale = Math.min(maxWidth / state.canvasWidth, maxHeight / state.canvasHeight, 1);

      canvas.style.width = `${state.canvasWidth * scale}px`;
      canvas.style.height = `${state.canvasHeight * scale}px`;

      document.getElementById('canvasSize').textContent = `${state.canvasWidth} x ${state.canvasHeight}`;
    }

    // ===== 渲染 =====
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 绘制背景
      if (state.source === 'upload' && state.uploadedImage) {
        drawUploadedImage();
      } else {
        drawGeneratedBackground();
      }

      // 绘制文字
      drawText();
    }

    function drawGeneratedBackground() {
      if (state.mode === 'solid') {
        ctx.fillStyle = state.bgColor1;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else {
        let gradient;
        const c1 = state.gradColor1;
        const c2 = state.gradColor2;

        switch (state.gradDir) {
          case 'to right':
            gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            break;
          case 'to bottom':
            gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            break;
          case 'to bottom right':
            gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            break;
          case 'circle':
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const r = Math.max(cx, cy);
            gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            break;
          default:
            gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        }

        gradient.addColorStop(0, c1);
        gradient.addColorStop(1, c2);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function drawUploadedImage() {
      const img = state.uploadedImage;
      const imgRatio = img.width / img.height;
      const canvasRatio = canvas.width / canvas.height;

      let drawWidth, drawHeight, drawX, drawY;

      if (imgRatio > canvasRatio) {
        drawWidth = canvas.width;
        drawHeight = canvas.width / imgRatio;
        drawX = 0;
        drawY = (canvas.height - drawHeight) / 2;
      } else {
        drawHeight = canvas.height;
        drawWidth = canvas.height * imgRatio;
        drawX = (canvas.width - drawWidth) / 2;
        drawY = 0;
      }

      // 填充背景
      ctx.fillStyle = '#1a2332';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
    }

    function drawText() {
      const text = state.text;
      if (!text.trim()) return;

      const x = state.textX * canvas.width;
      const y = state.textY * canvas.height;

      ctx.save();

      // 设置字体
      ctx.font = `${state.fontWeight} ${state.fontSize}px "${state.fontFamily}"`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // 阴影
      if (state.shadowBlur > 0) {
        ctx.shadowColor = state.shadowColor;
        ctx.shadowBlur = state.shadowBlur;
        ctx.shadowOffsetX = state.shadowBlur / 3;
        ctx.shadowOffsetY = state.shadowBlur / 3;
      }

      // 描边
      if (state.strokeWidth > 0) {
        ctx.strokeStyle = state.strokeColor;
        ctx.lineWidth = state.strokeWidth * 2;
        ctx.lineJoin = 'round';
        drawMultilineText(text, x, y, true);
      }

      // 填充
      ctx.fillStyle = state.textColor;
      drawMultilineText(text, x, y, false);

      ctx.restore();
    }

    function drawMultilineText(text, x, y, isStroke) {
      const lines = text.split('\n');
      const lineHeight = state.fontSize * 1.3;
      const totalHeight = lines.length * lineHeight;
      const startY = y - totalHeight / 2 + lineHeight / 2;

      lines.forEach((line, i) => {
        if (isStroke) {
          ctx.strokeText(line, x, startY + i * lineHeight);
        } else {
          ctx.fillText(line, x, startY + i * lineHeight);
        }
      });
    }

    // ===== 事件绑定 =====
    function bindEvents() {
      // Tab 切换
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          state.source = btn.dataset.tab === 'upload' ? 'upload' : 'generate';
          document.getElementById('generatePanel').classList.toggle('hidden', state.source === 'upload');
          document.getElementById('uploadPanel').classList.toggle('hidden', state.source === 'generate');

          render();
        });
      });

      // 模式切换
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.mode-btn').forEach(b => {
            b.classList.remove('bg-card', 'border-accent', 'text-accent');
            b.classList.add('bg-card', 'border-border', 'text-muted');
          });
          btn.classList.remove('border-border', 'text-muted');
          btn.classList.add('border-accent', 'text-accent');

          state.mode = btn.dataset.mode;
          document.getElementById('solidPicker').classList.toggle('hidden', state.mode === 'gradient');
          document.getElementById('gradientPicker').classList.toggle('hidden', state.mode === 'solid');

          render();
        });
      });

      // 颜色输入
      bindColorInput('bgColor1', 'bgColor1Text', v => { state.bgColor1 = v; render(); });
      bindColorInput('gradColor1', null, v => { state.gradColor1 = v; updateGradPreview(); render(); });
      bindColorInput('gradColor2', null, v => { state.gradColor2 = v; updateGradPreview(); render(); });
      bindColorInput('textColor', 'textColorText', v => { state.textColor = v; render(); });

      // 渐变方向
      document.querySelectorAll('.grad-dir').forEach(btn => {
        btn.addEventListener('click', () => {
          state.gradDir = btn.dataset.dir;
          updateGradPreview();
          render();
        });
      });

      // 尺寸选择
      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.size-btn').forEach(b => {
            b.classList.remove('bg-accent/20', 'border-accent', 'text-accent');
            b.classList.add('border-border');
          });
          btn.classList.add('bg-accent/20', 'border-accent', 'text-accent');
          btn.classList.remove('border-border');

          state.canvasWidth = parseInt(btn.dataset.w);
          state.canvasHeight = parseInt(btn.dataset.h);
          setupCanvas();
          render();
        });
      });

      // 文件上传
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');

      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-accent'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-accent'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('border-accent');
        handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

      // 文字设置
      document.getElementById('textContent').addEventListener('input', e => {
        state.text = e.target.value;
        render();
      });

      document.getElementById('fontFamily').addEventListener('change', e => {
        state.fontFamily = e.target.value;
        render();
      });

      bindSlider('fontSize', 'fontSizeVal', v => { state.fontSize = v; render(); }, 'px');
      bindSlider('fontWeight', 'fontWeightVal', v => { state.fontWeight = v; render(); });
      bindSlider('strokeWidth', 'strokeVal', v => { state.strokeWidth = v; render(); }, 'px');
      bindSlider('shadowBlur', 'shadowVal', v => { state.shadowBlur = v; render(); }, 'px');

      document.getElementById('strokeColor').addEventListener('input', e => {
        state.strokeColor = e.target.value;
        render();
      });
      document.getElementById('shadowColor').addEventListener('input', e => {
        state.shadowColor = e.target.value;
        render();
      });

      // 颜色预设
      document.querySelectorAll('.color-preset').forEach(btn => {
        btn.addEventListener('click', () => {
          const color = btn.dataset.color;
          state.textColor = color;
          document.getElementById('textColor').value = color;
          document.getElementById('textColorText').value = color;
          render();
        });
      });

      // 位置预设
      document.querySelectorAll('.pos-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.pos-btn').forEach(b => {
            b.classList.remove('bg-accent/20', 'border-accent', 'text-accent');
            b.classList.add('border-border');
          });
          btn.classList.add('bg-accent/20', 'border-accent', 'text-accent');
          btn.classList.remove('border-border');

          const pos = btn.dataset.pos;
          const positions = {
            tl: [0.2, 0.2], tc: [0.5, 0.2], tr: [0.8, 0.2],
            ml: [0.2, 0.5], mc: [0.5, 0.5], mr: [0.8, 0.5],
            bl: [0.2, 0.8], bc: [0.5, 0.8], br: [0.8, 0.8]
          };
          [state.textX, state.textY] = positions[pos];
          render();
        });
      });

      // 画布拖拽
      canvas.addEventListener('mousedown', startDrag);
      canvas.addEventListener('mousemove', drag);
      canvas.addEventListener('mouseup', endDrag);
      canvas.addEventListener('mouseleave', endDrag);

      // 触摸支持
      canvas.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e.touches[0]); });
      canvas.addEventListener('touchmove', e => { e.preventDefault(); drag(e.touches[0]); });
      canvas.addEventListener('touchend', endDrag);

      // 下载
      document.getElementById('downloadBtn').addEventListener('click', downloadImage);

      // 窗口resize
      window.addEventListener('resize', updateCanvasDisplay);
    }

    function bindColorInput(colorId, textId, callback) {
      const colorInput = document.getElementById(colorId);
      colorInput.addEventListener('input', e => {
        callback(e.target.value);
        if (textId) document.getElementById(textId).value = e.target.value;
      });

      if (textId) {
        const textInput = document.getElementById(textId);
        textInput.addEventListener('input', e => {
          const val = e.target.value;
          if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
            colorInput.value = val;
            callback(val);
          }
        });
      }
    }

    function bindSlider(sliderId, labelId, callback, suffix = '') {
      const slider = document.getElementById(sliderId);
      const label = document.getElementById(labelId);
      slider.addEventListener('input', e => {
        const val = parseInt(e.target.value);
        label.textContent = val + suffix;
        callback(val);
      });
    }

    function updateGradPreview() {
      const preview = document.getElementById('gradPreview');
      if (state.gradDir === 'circle') {
        preview.style.background = `radial-gradient(circle, ${state.gradColor1}, ${state.gradColor2})`;
      } else {
        preview.style.background = `linear-gradient(${state.gradDir}, ${state.gradColor1}, ${state.gradColor2})`;
      }
    }

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return;

      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          state.uploadedImage = img;
          state.canvasWidth = img.width;
          state.canvasHeight = img.height;
          setupCanvas();
          render();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ===== 拖拽功能 =====
    function startDrag(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;

      // 检测是否点击在文字区域
      ctx.font = `${state.fontWeight} ${state.fontSize}px "${state.fontFamily}"`;
      const lines = state.text.split('\n');
      const lineHeight = state.fontSize * 1.3;
      const maxWidth = Math.max(...lines.map(l => ctx.measureText(l).width));
      const textHeight = lines.length * lineHeight;

      const textX = state.textX * canvas.width;
      const textY = state.textY * canvas.height;

      if (Math.abs(x - textX) < maxWidth / 2 + 20 && Math.abs(y - textY) < textHeight / 2 + 20) {
        state.isDragging = true;
        state.dragStartX = x;
        state.dragStartY = y;
        state.originalTextX = state.textX;
        state.originalTextY = state.textY;
        canvas.style.cursor = 'grabbing';
      }
    }

    function drag(e) {
      if (!state.isDragging) return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;

      const dx = x - state.dragStartX;
      const dy = y - state.dragStartY;

      state.textX = Math.max(0.1, Math.min(0.9, state.originalTextX + dx / canvas.width));
      state.textY = Math.max(0.1, Math.min(0.9, state.originalTextY + dy / canvas.height));

      render();
    }

    function endDrag() {
      state.isDragging = false;
      canvas.style.cursor = 'default';
    }

    // ===== 下载功能 =====
    function downloadImage() {
      const link = document.createElement('a');
      link.download = `图文工坊_${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // 启动
    init();
  </script>
</body>
